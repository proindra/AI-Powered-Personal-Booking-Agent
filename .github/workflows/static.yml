name: Deploy 4th Dimension Workspace to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js static export
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          # Repo name must match exactly — used as basePath in next.config.ts
          NEXT_PUBLIC_BASE_PATH: /AI-Powered-Personal-Booking-Agent
          # Set in repo Settings → Secrets and variables → Actions
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          # Optional: point to a deployed backend; leave empty to use mock fallback
          NEXT_PUBLIC_LANGGRAPH_API_URL: ${{ secrets.NEXT_PUBLIC_LANGGRAPH_API_URL }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # next.config.ts writes the static export to frontend/out
          path: frontend/out

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
